<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmprendeAI - Planificador de Negocios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              // Custom Palette based on user request
              navy: {
                800: '#23405E',
                900: '#18324A', // Fondo principal
                950: '#0F172A', // Texto principal
              },
              brand: {
                400: '#4FD1C5',
                500: '#1FA89B', // Verde turquesa elegante
                600: '#178E82',
              },
              card: {
                DEFAULT: '#F2F4F7', // Blanco ligeramente grisáceo
                hover: '#FFFFFF'
              },
              text: {
                main: '#1E1E1E',
                secondary: '#6B7280'
              }
            },
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
              'glow': '0 0 15px rgba(31, 168, 155, 0.2)',
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out',
              'slide-up': 'slideUp 0.5s ease-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body { font-family: 'Inter', sans-serif; }
      /* Custom scrollbar for dark theme feel */
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #18324A; }
      ::-webkit-scrollbar-thumb { background: #23405E; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #1FA89B; }
    </style>
  <script type="importmap">
{

    "html2canvas": "https://esm.sh/html2canvas@^1.4.1"
  }
}
</script>

</head>
